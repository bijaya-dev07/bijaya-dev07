<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="background:#0c0c0d">
  <defs>
    <style>
      .code-line { font-family: 'Courier New', monospace; font-size: 13px; fill: #444; }
      .code-line.active { fill: #ff3e3e; }
      .code-line.dim { fill: #2a2a2a; }

      @keyframes typing1 { 0%,10%{width:0} 30%,100%{width:100%} }
      @keyframes typing2 { 0%,20%{width:0} 40%,100%{width:100%} }
      @keyframes typing3 { 0%,30%{width:0} 50%,100%{width:100%} }
      @keyframes typing4 { 0%,40%{width:0} 60%,100%{width:100%} }
      @keyframes typing5 { 0%,50%{width:0} 70%,100%{width:100%} }
      @keyframes typing6 { 0%,60%{width:0} 80%,100%{width:100%} }
      @keyframes typing7 { 0%,70%{width:0} 90%,100%{width:100%} }
      @keyframes typing8 { 0%,80%{width:0} 95%,100%{width:100%} }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes glow  { 0%,100%{filter:drop-shadow(0 0 4px #ff3e3e)} 50%{filter:drop-shadow(0 0 14px #ff3e3e)} }
      @keyframes scanline { 0%{transform:translateY(0)} 100%{transform:translateY(360px)} }
      @keyframes fadeloop { 0%,100%{opacity:.07} 50%{opacity:.13} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes pulse-ring { 0%{r:6;opacity:.8} 100%{r:22;opacity:0} }
      @keyframes slide-in { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

      .win { animation: float 4s ease-in-out infinite; }
      .cursor { animation: blink 1s step-end infinite; }
      .glow-dot { animation: glow 2s ease-in-out infinite; }
      .scanline { animation: scanline 3s linear infinite; opacity:.04; }
      .bg-grid { animation: fadeloop 4s ease-in-out infinite; }
    </style>

    <!-- monitor screen clip -->
    <clipPath id="screen-clip">
      <rect x="161" y="61" width="478" height="278" rx="4"/>
    </clipPath>

    <!-- code line clip masks -->
    <clipPath id="c1"><rect x="0" y="0" width="420" height="20"/></clipPath>
    <clipPath id="c2"><rect x="0" y="0" width="420" height="20"/></clipPath>
    <clipPath id="c3"><rect x="0" y="0" width="420" height="20"/></clipPath>
    <clipPath id="c4"><rect x="0" y="0" width="420" height="20"/></clipPath>
    <clipPath id="c5"><rect x="0" y="0" width="420" height="20"/></clipPath>
    <clipPath id="c6"><rect x="0" y="0" width="420" height="20"/></clipPath>
    <clipPath id="c7"><rect x="0" y="0" width="420" height="20"/></clipPath>
    <clipPath id="c8"><rect x="0" y="0" width="420" height="20"/></clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="800" height="400" fill="#0c0c0d"/>

  <!-- subtle grid -->
  <g class="bg-grid">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="400" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- ── MONITOR BODY (3D perspective) ── -->
  <g class="win">
    <!-- monitor shadow -->
    <ellipse cx="400" cy="375" rx="160" ry="10" fill="#000" opacity=".5"/>

    <!-- monitor back face (3D depth) -->
    <rect x="155" y="55" width="490" height="290" rx="14" fill="#1a0a0a" stroke="#3a1010" stroke-width="1.5"/>

    <!-- monitor bezel -->
    <rect x="158" y="58" width="484" height="284" rx="12" fill="#111" stroke="#ff3e3e" stroke-width="1.5"/>

    <!-- screen -->
    <rect x="161" y="61" width="478" height="278" rx="4" fill="#0a0a0b"/>

    <!-- screen content clipped -->
    <g clip-path="url(#screen-clip)">

      <!-- screen bg -->
      <rect x="161" y="61" width="478" height="278" fill="#0d0d0f"/>

      <!-- line numbers gutter -->
      <rect x="161" y="61" width="38" height="278" fill="#0a0a0c"/>
      <line x1="199" y1="61" x2="199" y2="339" stroke="#1e1e1e" stroke-width="1"/>

      <!-- top bar (editor tabs) -->
      <rect x="161" y="61" width="478" height="22" fill="#111113"/>
      <rect x="161" y="61" width="100" height="22" fill="#0d0d0f"/>
      <text x="175" y="76" font-family="monospace" font-size="10" fill="#ff3e3e">bijaya.tsx</text>
      <text x="275" y="76" font-family="monospace" font-size="10" fill="#444">index.ts</text>
      <text x="340" y="76" font-family="monospace" font-size="10" fill="#444">app.css</text>
      <line x1="161" y1="83" x2="639" y2="83" stroke="#1e1e1e" stroke-width="1"/>
      <!-- active tab underline -->
      <line x1="161" y1="83" x2="261" y2="83" stroke="#ff3e3e" stroke-width="2"/>

      <!-- LINE NUMBERS -->
      <text x="172" y="103" font-family="monospace" font-size="11" fill="#333">1</text>
      <text x="172" y="121" font-family="monospace" font-size="11" fill="#333">2</text>
      <text x="172" y="139" font-family="monospace" font-size="11" fill="#333">3</text>
      <text x="172" y="157" font-family="monospace" font-size="11" fill="#333">4</text>
      <text x="172" y="175" font-family="monospace" font-size="11" fill="#333">5</text>
      <text x="172" y="193" font-family="monospace" font-size="11" fill="#333">6</text>
      <text x="172" y="211" font-family="monospace" font-size="11" fill="#333">7</text>
      <text x="172" y="229" font-family="monospace" font-size="11" fill="#ff3e3e">8</text>
      <text x="172" y="247" font-family="monospace" font-size="11" fill="#333">9</text>
      <text x="172" y="265" font-family="monospace" font-size="11" fill="#333">10</text>
      <text x="165" y="283" font-family="monospace" font-size="11" fill="#333">11</text>
      <text x="165" y="301" font-family="monospace" font-size="11" fill="#333">12</text>

      <!-- ACTIVE LINE HIGHLIGHT -->
      <rect x="199" y="220" width="440" height="18" fill="#ff3e3e" opacity=".07"/>

      <!-- CODE LINES with typing animation -->
      <!-- line 1 -->
      <g transform="translate(205,87)">
        <g clip-path="url(#c1)">
          <text class="code-line" y="13" style="animation:typing1 8s steps(40) infinite">
            <tspan fill="#666">import</tspan>
            <tspan fill="#888"> React </tspan>
            <tspan fill="#666">from</tspan>
            <tspan fill="#ff6b6b"> 'react'</tspan>
            <tspan fill="#888">;</tspan>
          </text>
        </g>
      </g>
      <!-- line 2 -->
      <g transform="translate(205,105)">
        <g clip-path="url(#c2)">
          <text class="code-line" y="13" style="animation:typing2 8s steps(40) infinite">
            <tspan fill="#666">import</tspan>
            <tspan fill="#888"> { gsap } </tspan>
            <tspan fill="#666">from</tspan>
            <tspan fill="#ff6b6b"> 'gsap'</tspan>
            <tspan fill="#888">;</tspan>
          </text>
        </g>
      </g>
      <!-- line 3 (blank) -->
      <g transform="translate(205,123)">
        <text class="code-line dim" y="13"> </text>
      </g>
      <!-- line 4 -->
      <g transform="translate(205,141)">
        <g clip-path="url(#c4)">
          <text class="code-line" y="13" style="animation:typing3 8s steps(40) infinite">
            <tspan fill="#666">const</tspan>
            <tspan fill="#ff3e3e"> Bijaya</tspan>
            <tspan fill="#888"> = () </tspan>
            <tspan fill="#666">=&gt;</tspan>
            <tspan fill="#888"> {'{'}  </tspan>
          </text>
        </g>
      </g>
      <!-- line 5 -->
      <g transform="translate(205,159)">
        <g clip-path="url(#c5)">
          <text class="code-line" y="13" style="animation:typing4 8s steps(40) infinite">
            <tspan fill="#888">  </tspan>
            <tspan fill="#666">const</tspan>
            <tspan fill="#888"> skills </tspan>
            <tspan fill="#666">=</tspan>
            <tspan fill="#888"> [</tspan>
            <tspan fill="#ff6b6b">'React'</tspan>
            <tspan fill="#888">, </tspan>
            <tspan fill="#ff6b6b">'Next'</tspan>
            <tspan fill="#888">, </tspan>
            <tspan fill="#ff6b6b">'GSAP'</tspan>
            <tspan fill="#888">];</tspan>
          </text>
        </g>
      </g>
      <!-- line 6 -->
      <g transform="translate(205,177)">
        <g clip-path="url(#c6)">
          <text class="code-line" y="13" style="animation:typing5 8s steps(40) infinite">
            <tspan fill="#888">  </tspan>
            <tspan fill="#666">const</tspan>
            <tspan fill="#888"> passion </tspan>
            <tspan fill="#666">=</tspan>
            <tspan fill="#ff6b6b"> "build interfaces that feel alive"</tspan>
            <tspan fill="#888">;</tspan>
          </text>
        </g>
      </g>
      <!-- line 7 (blank) -->
      <g transform="translate(205,195)">
        <text class="code-line dim" y="13"> </text>
      </g>
      <!-- line 8 (active) -->
      <g transform="translate(205,213)">
        <g clip-path="url(#c8)">
          <text class="code-line active" y="13" style="animation:typing6 8s steps(40) infinite">
            <tspan fill="#888">  </tspan>
            <tspan fill="#666">return</tspan>
            <tspan fill="#888"> (</tspan>
            <tspan fill="#ff3e3e"> &lt;Portfolio</tspan>
            <tspan fill="#888"> skills</tspan>
            <tspan fill="#666">=</tspan>
            <tspan fill="#888">{'{'}skills{'}'}</tspan>
            <tspan fill="#ff3e3e"> /&gt;</tspan>
            <tspan fill="#888"> );</tspan>
          </text>
        </g>
      </g>
      <!-- cursor after active line -->
      <rect class="cursor" x="421" y="215" width="2" height="14" fill="#ff3e3e"/>

      <!-- line 9 -->
      <g transform="translate(205,249)">
        <text class="code-line dim" y="13">
          <tspan fill="#444">{'}'}</tspan>
          <tspan fill="#888">;</tspan>
        </text>
      </g>
      <!-- line 10 -->
      <g transform="translate(205,267)">
        <g clip-path="url(#c7)">
          <text class="code-line" y="13" style="animation:typing7 8s steps(40) infinite">
            <tspan fill="#666">export default</tspan>
            <tspan fill="#ff3e3e"> Bijaya</tspan>
            <tspan fill="#888">;</tspan>
          </text>
        </g>
      </g>

      <!-- scrolling scanline -->
      <rect class="scanline" x="161" y="83" width="478" height="8" fill="#ff3e3e"/>

    </g>

    <!-- monitor bottom bezel -->
    <rect x="158" y="341" width="484" height="16" rx="0" fill="#111" stroke="#ff3e3e" stroke-width="1" opacity=".5"/>

    <!-- monitor stand neck -->
    <rect x="385" y="357" width="30" height="20" rx="2" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <!-- stand base -->
    <rect x="340" y="375" width="120" height="8" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  </g>

  <!-- ── LEFT FLOATING BADGE: STATUS ── -->
  <g style="animation:float 3.5s ease-in-out infinite; animation-delay:.5s">
    <rect x="18" y="130" width="120" height="54" rx="10" fill="#111" stroke="#ff3e3e" stroke-width="1.2"/>
    <!-- pulse ring -->
    <circle cx="36" cy="150" r="6" fill="#ff3e3e" class="glow-dot"/>
    <circle cx="36" cy="150" fill="none" stroke="#ff3e3e" stroke-width="1.5" opacity=".5">
      <animate attributeName="r" from="6" to="22" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from=".8" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="146" font-family="monospace" font-size="10" fill="#888">STATUS</text>
    <text x="50" y="161" font-family="monospace" font-size="11" fill="#ff3e3e">● Available</text>
    <text x="28" y="178" font-family="monospace" font-size="9" fill="#444">for work ⚡</text>
  </g>

  <!-- ── LEFT FLOATING BADGE: COMMITS ── -->
  <g style="animation:float 5s ease-in-out infinite; animation-delay:1s">
    <rect x="18" y="210" width="120" height="54" rx="10" fill="#111" stroke="#222" stroke-width="1.2"/>
    <text x="28" y="230" font-family="monospace" font-size="9" fill="#555">COMMITS</text>
    <text x="28" y="248" font-family="monospace" font-size="20" fill="#ff3e3e" font-weight="bold">247</text>
    <text x="28" y="260" font-family="monospace" font-size="9" fill="#444">this year 🔥</text>
  </g>

  <!-- ── RIGHT FLOATING BADGE: STACK ── -->
  <g style="animation:float 4s ease-in-out infinite; animation-delay:.2s">
    <rect x="662" y="110" width="120" height="100" rx="10" fill="#111" stroke="#222" stroke-width="1.2"/>
    <text x="672" y="130" font-family="monospace" font-size="9" fill="#555">STACK</text>
    <text x="672" y="148" font-family="monospace" font-size="11" fill="#ff3e3e">▸ Next.js</text>
    <text x="672" y="164" font-family="monospace" font-size="11" fill="#666">▸ TypeScript</text>
    <text x="672" y="180" font-family="monospace" font-size="11" fill="#666">▸ GSAP</text>
    <text x="672" y="196" font-family="monospace" font-size="11" fill="#666">▸ MongoDB</text>
    <text x="672" y="204" font-family="monospace" font-size="9" fill="#333">────────────</text>
  </g>

  <!-- ── RIGHT FLOATING BADGE: LOCATION ── -->
  <g style="animation:float 3.8s ease-in-out infinite; animation-delay:1.5s">
    <rect x="662" y="228" width="120" height="44" rx="10" fill="#111" stroke="#222" stroke-width="1.2"/>
    <text x="672" y="246" font-family="monospace" font-size="10" fill="#555">📍 LOCATION</text>
    <text x="672" y="264" font-family="monospace" font-size="11" fill="#888">Kathmandu 🇳🇵</text>
  </g>

  <!-- ── BOTTOM DECORATIVE DOTS ── -->
  <circle cx="60" cy="370" r="2" fill="#ff3e3e" opacity=".4"/>
  <circle cx="72" cy="370" r="2" fill="#ff3e3e" opacity=".25"/>
  <circle cx="84" cy="370" r="2" fill="#ff3e3e" opacity=".1"/>
  <circle cx="740" cy="370" r="2" fill="#ff3e3e" opacity=".4"/>
  <circle cx="728" cy="370" r="2" fill="#ff3e3e" opacity=".25"/>
  <circle cx="716" cy="370" r="2" fill="#ff3e3e" opacity=".1"/>
</svg>
